# =============================================================================
# NYTab Docker Nginx 配置(挂载到 /etc/nginx/conf.d/default.conf)
# =============================================================================
# 容器内路径:
#   /usr/share/nginx/html              前端 SPA 产物(frontend-dist 共享卷)
#   /var/www/html/uploads              用户上传文件(uploads 共享卷,只读)
#   /var/www/html/public/index.php     后端单入口(在 nytab-php 容器内,
#                                        通过 fastcgi_pass 传递 SCRIPT_FILENAME)
# =============================================================================

server {
    listen 80;
    server_name _;

    # 前端 SPA 产物根目录
    root /usr/share/nginx/html;
    index index.html;

    # 上传体积限制(与 php.ini upload_max_filesize 配合)
    client_max_body_size 10M;

    # ----- 前端 SPA history 路由回退 -----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html 不缓存,确保发布后立即生效
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # ----- 带指纹的静态资源:长期强缓存 -----
    # Vite 产物中 assets/*.{js,css,woff2,png,svg} 均带 hash,可安全 immutable
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    # ----- 后端 API 反代 PHP-FPM -----
    # 后端是单入口 public/index.php,所有 /api/* 请求统一交给该入口路由分发。
    # 注意:SCRIPT_FILENAME 硬编码指向 nytab-php 容器内的绝对路径,
    #       而非 $document_root(nginx 容器内没有后端代码)。
    location /api/ {
        # try_files 找不到文件时回退到 index.php(单入口模式);
        # 后端 Request::path() 读取 $_SERVER['REQUEST_URI'] 取原始 URI,
        # 不受此处内部 rewrite 影响。
        try_files $uri /index.php$is_args$args;

        fastcgi_pass   nytab-php:9000;
        fastcgi_index  index.php;
        include        fastcgi_params;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # 指向 nytab-php 容器内的后端单入口
        fastcgi_param  SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param  PATH_INFO       $uri;
        fastcgi_param  QUERY_STRING    $query_string;

        # 转发真实客户端信息给后端
        fastcgi_param  HTTP_HOST           $host;
        fastcgi_param  HTTP_X_REAL_IP      $remote_addr;
        fastcgi_param  HTTP_X_FORWARDED_FOR   $proxy_add_x_forwarded_for;
        fastcgi_param  HTTP_X_FORWARDED_PROTO $scheme;

        # 超时
        fastcgi_read_timeout 60s;
        fastcgi_send_timeout 60s;

        # API 响应不缓存
        add_header Cache-Control "no-store" always;
    }

    # ----- 上传文件静态资源 -----
    location /uploads/ {
        alias /var/www/html/uploads/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
        access_log off;

        # 防止 uploads 目录下任何 .php 被执行(即使误传也无效)
        location ~ \.php$ {
            deny all;
        }
    }

    # ----- 安全 deny:敏感文件与目录 -----
    location ~ /\.env {
        deny all;
        return 404;
    }
    location ~ /installed\.lock$ {
        deny all;
        return 404;
    }
    location ~ /config/ {
        deny all;
        return 404;
    }
    location ~ /migrations/ {
        deny all;
        return 404;
    }
    location ~ /src/ {
        deny all;
        return 404;
    }
    # 隐藏文件(.git / .trae 等),但放行 Let's Encrypt 验证
    location ~ /\.(?!well-known).* {
        deny all;
        return 404;
    }
}
