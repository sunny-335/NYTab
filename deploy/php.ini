; =============================================================================
; NYTab 生产环境 PHP 配置(php.ini 片段)
; =============================================================================
; 部署为 fpm conf.d 下的 99-nytab.ini,确保覆盖默认值:
;   sudo cp deploy/php.ini /etc/php/8.2/fpm/conf.d/99-nytab.ini
;   sudo systemctl restart php8.2-fpm
;
; 同时建议 CLI 也加载一份:
;   sudo cp deploy/php.ini /etc/php/8.2/cli/conf.d/99-nytab.ini
; =============================================================================

; ----- 错误处理(生产) -----
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
display_errors = Off
display_startup_errors = Off
log_errors = On
; 日志路径需预先创建: sudo mkdir -p /var/log/php && sudo chown www-data:www-data /var/log/php
error_log = /var/log/php/error.log
ignore_repeated_errors = On
ignore_repeated_source = On

; ----- 隐藏 PHP 版本 -----
expose_php = Off

; ----- 资源限制 -----
max_execution_time = 30
max_input_time = 60
memory_limit = 128M

; ----- 上传(图标上传场景) -----
upload_max_filesize = 5M
post_max_size = 8M
max_file_uploads = 20

; ----- 时区 -----
date.timezone = Asia/Shanghai

; ----- 字符集 -----
default_charset = "UTF-8"
mbstring.language = neutral
mbstring.internal_encoding = UTF-8

; ----- 会话(本项目使用 JWT,但保留基线) -----
session.cookie_httponly = 1
session.cookie_samesite = Strict
session.use_strict_mode = 1
session.use_only_cookies = 1

; ----- OPcache(生产) -----
; 启用 OPcache,显著提升 PHP 性能
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
; 生产环境关闭时间戳校验,代码更新后需重启 php-fpm(部署脚本应包含 systemctl restart php8.2-fpm)
opcache.validate_timestamps = 0
opcache.revalidate_freq = 2
opcache.save_comments = 1
opcache.fast_shutdown = 1

; ----- PostgreSQL 扩展 -----
; 需安装系统包: sudo apt install php8.2-pgsql
; 装好后扩展通常自动加载,若未自动加载请取消下面注释:
; extension=pdo_pgsql
; extension=pgsql

; ----- 禁用危险函数 -----
disable_functions = exec,passthru,shell_exec,system,proc_open,popen,curl_exec,curl_multi_exec,parse_ini_file,show_source

; ----- realpath 缓存(生产推荐) -----
realpath_cache_size = 4096k
realpath_cache_ttl = 600

; ----- 文件上传临时目录(可选,默认即可) -----
; upload_tmp_dir = /tmp

; ----- Zend OPCache 输出 -----
; opcache.error_log = /var/log/php/opcache-error.log
