; =============================================================================
; NYTab 生产环境 PHP-FPM 池配置(www pool)
; =============================================================================
; 部署:
;   sudo cp deploy/php-fpm.conf /etc/php/8.2/fpm/pool.d/nytab.conf
;   sudo systemctl restart php8.2-fpm
;
; 注意:本文件覆盖默认 www.conf,若已存在请先备份。
;       user/group 在 Debian/Ubuntu 上为 www-data,RHEL/CentOS 为 apache/nginx。
; =============================================================================

[www]

; ----- 监听地址(与 nginx.conf 中 fastcgi_pass 保持一致) -----
; 推荐使用 Unix socket,性能优于 TCP。
listen = /run/php/php8.2-fpm.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; ----- 运行用户/组(★ 占位:Debian/Ubuntu 为 www-data) -----
user = www-data
group = www-data

; ----- 进程管理 -----
pm = dynamic
pm.max_children = 10            ; 中小流量推荐 10-20,依据服务器内存调整
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6

; 单个 worker 处理 500 个请求后重启,防止内存泄漏累积
pm.max_requests = 500

; 慢日志:超过 5s 的请求记录调用栈
request_slowlog_timeout = 5s
slowlog = /var/log/php/nytab-slow.log

; ----- 错误与访问日志 -----
catch_workers_output = yes
decorate_workers_output = yes

; ----- 通过 php_admin_* 强制覆盖 php.ini 设置 -----
; 这些值无法被 .htaccess 或 ini_set 覆盖,确保安全基线。

; 错误日志(路径需预先创建并赋权)
php_admin_value[error_log] = /var/log/php/nytab-error.log
php_admin_flag[log_errors] = on

; 上传限制(图标上传场景,与 nginx client_max_body_size 配合)
php_admin_value[upload_max_filesize] = 5M
php_admin_value[post_max_size] = 8M

; 时区
php_admin_value[date.timezone] = Asia/Shanghai

; 会话(本项目使用 JWT,基本不依赖 session;仅作为基线)
php_admin_value[session.cookie_httponly] = 1
php_admin_value[session.cookie_samesite] = Strict
php_admin_value[session.use_strict_mode] = 1

; 关闭 PHP 版本暴露(php.ini 中也设置了,这里二次保险)
php_admin_flag[expose_php] = off

; 禁用危险函数(生产基线,按需放开)
php_admin_value[disable_functions] = exec,passthru,shell_exec,system,proc_open,popen,curl_exec,curl_multi_exec,parse_ini_file,show_source
