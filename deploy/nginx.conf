# =============================================================================
# NYTab 生产环境 Nginx 配置
# =============================================================================
# 部署路径：
#   /var/www/nytab/frontend/dist       前端 SPA 产物
#   /var/www/nytab/backend/public      后端入口 index.php
#   /var/www/nytab/backend/uploads     用户上传的图标
#   /var/www/nytab/backend/config      配置目录(含 installed.lock,需 deny)
#
# 启用方式：
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/nytab
#   sudo ln -s /etc/nginx/sites-available/nytab /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL 证书：用 certbot 申请，或手动放置到下方 ssl_certificate 路径。
# =============================================================================

# ----- gzip 压缩(在 http 块内通常已存在,这里给出推荐配置) -----
# 若全局 nginx.conf 已配置 gzip,可删除下面这段或合并到 http {} 中。
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/xml
    application/javascript
    application/json
    application/xml
    application/xml+rss
    image/svg+xml
    font/woff
    font/woff2;

# -----------------------------------------------------------------------------
# HTTP -> HTTPS 强制跳转
# -----------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name nytab.example.com;          # ★ 占位,部署时替换为实际域名

    # 仅 Let's Encrypt webroot 验证放行(如使用 certbot --webroot)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# -----------------------------------------------------------------------------
# HTTPS 主站点
# -----------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nytab.example.com;          # ★ 占位,部署时替换为实际域名

    # ----- SSL 证书(★ 占位,部署时替换为实际路径) -----
    ssl_certificate     /etc/letsencrypt/live/nytab.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nytab.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ----- 安全头 -----
    # HSTS:强制浏览器后续都走 HTTPS(2 年 + 预加载)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ----- 文档根:前端 SPA 产物 -----
    root /var/www/nytab/frontend/dist;
    index index.html;

    # 上传体积限制(图标上传场景)
    client_max_body_size 10M;

    # ----- 前端 SPA history 路由回退 -----
    # index.html 不缓存,确保用户每次拿到最新版本(发布后立即生效)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ----- 带指纹的静态资源:长期强缓存 -----
    # Vite 产物中 assets/*.{js,css,woff2,png,svg} 均带 hash,可安全 immutable
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    # ----- 后端 API 反代 PHP-FPM -----
    # 后端是单入口 backend/public/index.php,通过 FastCGI 直接交给 PHP-FPM。
    # 所有 /api/* 请求统一由该入口路由分发。
    location /api/ {
        # try_files 找不到文件时回退到 index.php(单入口模式)
        try_files $uri /index.php$is_args$args;

        fastcgi_pass   unix:/run/php/php8.2-fpm.sock;     # ★ 与 php-fpm.conf 中 listen 一致
        fastcgi_index  index.php;
        include        fastcgi_params;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # SCRIPT_FILENAME 指向后端单入口(注意不是 $document_root)
        fastcgi_param  SCRIPT_FILENAME /var/www/nytab/backend/public/index.php;
        fastcgi_param  PATH_INFO       $uri;
        fastcgi_param  QUERY_STRING    $query_string;

        # 转发真实客户端信息给后端
        fastcgi_param  HTTP_HOST           $host;
        fastcgi_param  HTTP_X_REAL_IP      $remote_addr;
        fastcgi_param  HTTP_X_FORWARDED_FOR   $proxy_add_x_forwarded_for;
        fastcgi_param  HTTP_X_FORWARDED_PROTO $scheme;

        # 超时
        fastcgi_read_timeout 60s;
        fastcgi_send_timeout 60s;

        # API 响应不缓存
        add_header Cache-Control "no-store" always;
    }

    # ----- 上传的图标静态资源 -----
    location /uploads/ {
        alias /var/www/nytab/backend/uploads/;     # ★ 末尾必须带 /
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
        access_log off;

        # 防止 uploads 目录下任何 .php 被执行(即使误传也无效)
        location ~ \.php$ {
            deny all;
        }
    }

    # ----- 安全 deny:敏感文件与目录 -----
    # .env 类文件(含 .env.example / .env.local 等)
    location ~ /\.env {
        deny all;
        return 404;
    }

    # installed.lock 安装锁
    location ~ /installed\.lock$ {
        deny all;
        return 404;
    }

    # config 目录(含 env.example.php、installed.lock 等)
    location ~ /config/ {
        deny all;
        return 404;
    }

    # 隐藏文件(.git / .gitignore / .trae 等)
    location ~ /\.(?!well-known).* {
        deny all;
        return 404;
    }

    # migrations 目录不暴露
    location ~ /migrations/ {
        deny all;
        return 404;
    }

    # src 目录不暴露
    location ~ /src/ {
        deny all;
        return 404;
    }
}
